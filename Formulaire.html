<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'inscription — Ficius Juris Club</title>
    <link rel="stylesheet" href="Style2.css">
</head>
<body>
    <header class="form-header">
        <a href="index.html" class="back-link">&larr; Retour à l'accueil</a>
    </header>
    <main class="form-container">
        <h1>Formulaire d'inscription</h1>
        <h3>Ficius Juris Club</h3>

        <form id="inscription-form" action="#" method="post">
            <div class="form-group">
                <label for="nom">Nom</label>
                <input type="text" id="nom" name="nom" required>
            </div>

            <div class="form-group">
                <label for="postnom">Post-nom</label>
                <input type="text" id="postnom" name="postnom" required>
            </div>

            <div class="form-group">
                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" name="prenom" required>
            </div>

            <div class="form-group">
                <label for="email">Adresse mail</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="telephone">Numéro de téléphone</label>
                <input type="tel" id="telephone" name="telephone">
            </div>

            <button type="submit" class="alert-button">Envoyer</button>
        </form>
    </main>
    <footer class="form-footer">
        <p>&copy; Ficius Juris Club</p>
    </footer>

    <script>
        document.getElementById('inscription-form').addEventListener('submit', function (e) {
            e.preventDefault();
            alert('Merci pour votre inscription ! Nous vous contacterons prochainement.');
            this.reset();
        });
    </script>
</body>
</html>
